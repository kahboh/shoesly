apiVersion: apps/v1
kind: Deployment

metadata:
  name: interiorvision-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: interiorvision-frontend

  template:
    metadata:
      labels:
        app: interiorvision-frontend

    spec:
      containers:
        - name: frontend
          image: interiorvision-frontend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 80