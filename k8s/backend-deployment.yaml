apiVersion: apps/v1
kind: Deployment

metadata:
  name: interiorvision-api

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: interiorvision-api

  template:
    metadata:
      labels:
        app: interiorvision-api

    spec:
      containers:
        - name: api
          image: kahboh/shoesly-backend:v1
          ports:
            - containerPort: 3000