apiVersion: apps/v1
kind: Deployment
metadata:
  name: interiorvision-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interiorvision-api
  template:
    metadata:
      labels:
        app: interiorvision-api
    spec:
      containers:
        - name: api
          image: yourdockerhub/interiorvision-backend:latest
          ports:
            - containerPort: 3000